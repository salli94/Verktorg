# fly.toml app configuration file for Verktorg

app = "verktorg"
primary_region = "ams"

[build]

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/verktorg.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "verktorg_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
