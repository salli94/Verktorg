<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Verktorg.is tengir þig við staðfesta íslenska fagmenn — rafvirkja, pípara, smiði og fleiri. Öruggt, einfalt og hratt.">
    <meta property="og:title" content="Verktorg.is — Finndu réttu fagmanninn fyrir verkið">
    <meta property="og:description" content="Öruggur miðill fyrir íslenska fagmenn og þá sem þurfa á þeim að halda.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="is_IS">
    <link rel="icon" type="image/svg+xml" href="/frontend/favicon.svg">
    <title>Verktorg.is — Öruggur miðill fyrir fagmenn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/frontend/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'Bricolage Grotesque', 'Inter', sans-serif; letter-spacing: -0.02em; }
        [x-cloak] { display: none !important; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15); }
        .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .glass-dark { background: rgba(15,23,42,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .btn-primary { background: #2563eb; color: white; font-weight: 600; border-radius: 12px; padding: 12px 28px; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; transform: scale(1.02); }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: 600; border-radius: 12px; padding: 12px 28px; transition: all 0.2s; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-field { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; transition: all 0.2s; background: white; }
        .input-field:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .input-error { border-color: #ef4444; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        .animate-slide-down { animation: slideDown 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        @media (min-width: 768px) { .category-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
        .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        .notification { position: fixed; top: 20px; right: 20px; z-index: 9999; max-width: 400px; }
        @media (max-width: 640px) { .notification { left: 20px; right: 20px; max-width: none; } }

        /* Ambient hero orbs */
        .orb { position: absolute; border-radius: 9999px; filter: blur(70px); pointer-events: none; }
        @keyframes float-a { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, -30px) scale(1.08); } }
        @keyframes float-b { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-35px, 25px) scale(1.1); } }
        .orb-1 { animation: float-a 20s ease-in-out infinite; }
        .orb-2 { animation: float-b 24s ease-in-out infinite; }

        /* Trust badge pulse */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(96,165,250,0.45); }
            70% { box-shadow: 0 0 0 8px rgba(96,165,250,0); }
            100% { box-shadow: 0 0 0 0 rgba(96,165,250,0); }
        }
        .badge-pulse { animation: pulse-ring 2.8s ease-out infinite; }

        /* Rotating dashed ring around step numbers */
        @keyframes spin-slow { to { transform: rotate(360deg); } }
        .step-ring { position: relative; }
        .step-ring::after {
            content: ''; position: absolute; inset: -6px; border-radius: 20px;
            border: 2px dashed currentColor; opacity: 0.25;
            animation: spin-slow 40s linear infinite;
        }

        /* Gentle float for feature icons */
        @keyframes icon-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .icon-float { animation: icon-bob 3.2s ease-in-out infinite; }

        /* Custom animated icon set (category chips + trust icons) */
        .ic-pulse, .ic-swing, .ic-grow, .ic-spin { transform-box: fill-box; transform-origin: center; }
        @keyframes ic-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(1.2); } }
        .ic-pulse { animation: ic-pulse 2.2s ease-in-out infinite; }
        @keyframes ic-swing { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-16deg); } }
        .ic-swing { animation: ic-swing 2.6s ease-in-out infinite; }
        @keyframes ic-grow { 0%, 100% { transform: scaleY(.82); opacity: .8; } 50% { transform: scaleY(1); opacity: 1; } }
        .ic-grow { animation: ic-grow 3.2s ease-in-out infinite; transform-origin: bottom center; }
        @keyframes ic-draw { 0%, 35% { stroke-dashoffset: 14; } 65%, 100% { stroke-dashoffset: 0; } }
        .ic-draw { animation: ic-draw 2.8s ease-in-out infinite; }
        @keyframes ic-drip { 0% { transform: translateY(-3px); opacity: 0; } 25% { opacity: 1; } 70% { transform: translateY(5px); opacity: 0; } 100% { transform: translateY(5px); opacity: 0; } }
        .ic-drip { animation: ic-drip 2s ease-in infinite; }
        .ic-spin { animation: spin-slow 7s linear infinite; }

        /* Primary button shine sweep */
        .btn-primary, .btn-secondary { position: relative; overflow: hidden; }
        .btn-primary::after {
            content: ''; position: absolute; top: 0; left: -75%; width: 50%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-20deg); transition: left 0.6s ease;
        }
        .btn-primary:hover::after { left: 125%; }
        .btn-primary:active, .btn-secondary:active { transform: scale(0.97); }

        /* Category chip icon motion */
        .cat-chip:hover .cat-icon { transform: scale(1.2) rotate(-6deg); }
        .cat-icon { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: inline-block; }

        /* Respect users who've asked for less motion */
        @media (prefers-reduced-motion: reduce) {
            .orb, .badge-pulse, .step-ring::after, .icon-float,
            .ic-pulse, .ic-swing, .ic-grow, .ic-draw, .ic-drip, .ic-spin,
            .btn-primary::after {
                animation: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased" x-data x-init="$store.app.init()" x-cloak>

<!-- Notification -->
<template x-teleport="body">
    <div class="notification" x-show="$store.app.notification" x-transition.duration.300ms>
        <div :class="'px-5 py-4 rounded-2xl shadow-2xl border font-medium animate-slide-down ' + (
            $store.app.notification?.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
            $store.app.notification?.type === 'error' ? 'bg-red-50 border-red-200 text-red-800' :
            'bg-white border-slate-200 text-slate-800'
        )">
            <div class="flex items-center gap-3">
                <i :class="$store.app.notification?.type === 'success' ? 'fas fa-check-circle text-emerald-500' :
                          $store.app.notification?.type === 'error' ? 'fas fa-exclamation-circle text-red-500' :
                          'fas fa-info-circle text-blue-500'" class="text-lg"></i>
                <span x-text="$store.app.notification?.msg"></span>
            </div>
        </div>
    </div>
</template>

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-slate-200/80">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <a href="#" @click.prevent="$store.app.view = 'home'" class="flex items-center gap-2 cursor-pointer">
                <svg viewBox="0 0 36 36" class="w-9 h-9" aria-hidden="true">
                    <rect width="36" height="36" rx="10" fill="url(#vtGradNav)"/>
                    <path d="M11 17 L17 25 L25 11" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="25" cy="11" r="2" fill="#f59e0b"/>
                    <defs>
                        <linearGradient id="vtGradNav" x1="0" y1="0" x2="36" y2="36">
                            <stop stop-color="#3b82f6"/><stop offset="1" stop-color="#1e3a8a"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span class="font-display font-extrabold text-xl tracking-tight">Verktorg<span class="text-blue-600">.is</span></span>
            </a>

            <!-- Desktop nav -->
            <div class="hidden md:flex items-center gap-8">
                <a href="#" @click.prevent="$store.app.view = 'jobs'" class="text-slate-600 hover:text-blue-600 font-medium transition text-sm">Verkefni</a>
                <a href="#" @click.prevent="$store.app.view = 'craftsmen'" class="text-slate-600 hover:text-blue-600 font-medium transition text-sm">Fagmenn</a>
                <template x-if="$store.app.user">
                    <a href="#" @click.prevent="$store.app.view = 'dashboard'" class="text-slate-600 hover:text-blue-600 font-medium transition text-sm">Mín síða</a>
                </template>
            </div>

            <div class="flex items-center gap-3">
                <template x-if="!$store.app.user">
                    <a href="#" @click.prevent="$store.app.view = 'login'" class="text-slate-600 hover:text-blue-600 font-medium text-sm hidden sm:inline">Innskráning</a>
                </template>
                <template x-if="!$store.app.user">
                    <button @click="$store.app.view = 'login'; $store.app.__registerMode = true" class="btn-primary text-sm px-5 py-2.5 shadow-lg shadow-blue-500/25">
                        <i class="fas fa-plus-circle mr-1.5"></i>Nýskráning
                    </button>
                </template>
                <template x-if="$store.app.user">
                    <div class="flex items-center gap-3">
                        <button @click="$store.app.view = 'post-job'" class="btn-primary text-sm px-5 py-2.5 shadow-lg shadow-blue-500/25 hidden sm:flex items-center gap-1.5">
                            <i class="fas fa-plus"></i> Lýsa verkefni
                        </button>
                        <!-- Notification bell -->
                        <div class="relative" x-data="{ open: false }" @click.outside="open = false">
                            <button @click="open = !open" class="relative w-9 h-9 rounded-xl flex items-center justify-center hover:bg-slate-100 transition">
                                <i class="fas fa-bell text-slate-600 text-lg"></i>
                                <template x-if="$store.app.unreadCount > 0">
                                    <span class="absolute -top-0.5 -right-0.5 w-4.5 h-4.5 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center min-w-[18px] min-h-[18px] leading-none shadow-sm" x-text="$store.app.unreadCount > 99 ? '99+' : $store.app.unreadCount"></span>
                                </template>
                            </button>
                            <!-- Notification dropdown -->
                            <div x-show="open" class="absolute right-0 mt-2 w-80 sm:w-96 bg-white rounded-2xl shadow-xl border border-slate-100 animate-slide-down max-h-[70vh] flex flex-col">
                                <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100 shrink-0">
                                    <span class="font-bold text-sm">Tilkynningar</span>
                                    <div class="flex gap-2">
                                        <template x-if="$store.app.unreadCount > 0">
                                            <button @click="$store.app.markAllNotifRead(); open = true" class="text-xs text-blue-600 hover:text-blue-800 font-medium">Merkja allt lesið</button>
                                        </template>
                                        <button @click="open = false" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
                                    </div>
                                </div>
                                <div class="overflow-y-auto flex-1">
                                    <template x-if="$store.app.notifications.length === 0">
                                        <div class="p-8 text-center text-slate-400">
                                            <i class="fas fa-bell text-3xl mb-3 opacity-40"></i>
                                            <p class="text-sm">Engar tilkynningar</p>
                                        </div>
                                    </template>
                                    <template x-for="n in $store.app.notifications" :key="n.id">
                                        <div @click="$store.app.markNotifRead(n.id)" :class="'flex items-start gap-3 px-4 py-3 border-b border-slate-50 cursor-pointer transition ' + (n.is_read ? 'hover:bg-slate-50' : 'bg-blue-50/50 hover:bg-blue-50')">
                                            <div class="mt-0.5">
                                                <i :class="n.type === 'new_bid' ? 'fas fa-hand-holding-usd text-green-500' : n.type === 'bid_accepted' ? 'fas fa-check-circle text-blue-500' : n.type === 'job_completed' ? 'fas fa-flag-checkered text-emerald-500' : 'fas fa-info-circle text-slate-400'" class="text-base"></i>
                                            </div>
                                            <div class="flex-1 min-w-0">
                                                <p class="text-sm font-medium text-slate-800 leading-snug" x-text="n.message"></p>
                                                <p class="text-xs text-slate-400 mt-0.5" x-text="new Date(n.created_at).toLocaleDateString('is-IS', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })"></p>
                                            </div>
                                            <template x-if="!n.is_read">
                                                <span class="w-2 h-2 bg-blue-500 rounded-full mt-2 shrink-0"></span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open" class="w-9 h-9 bg-blue-100 text-blue-700 rounded-xl flex items-center justify-center font-bold text-sm hover:bg-blue-200 transition">
                                <span x-text="$store.app.user.full_name.charAt(0).toUpperCase()"></span>
                            </button>
                            <div x-show="open" @click.outside="open = false" class="absolute right-0 mt-2 w-52 bg-white rounded-2xl shadow-xl border border-slate-100 py-2 animate-slide-down">
                                <div class="px-4 py-2 border-b border-slate-100">
                                    <p class="font-semibold text-sm" x-text="$store.app.user.full_name"></p>
                                    <p class="text-xs text-slate-500" x-text="$store.app.user.email"></p>
                                </div>
                                <a href="#" @click.prevent="$store.app.view = 'dashboard'; open = false" class="block px-4 py-2.5 text-sm hover:bg-slate-50 transition">Mín síða</a>
                                <a href="#" @click.prevent="$store.app.view = 'post-job'; open = false" class="block px-4 py-2.5 text-sm hover:bg-slate-50 transition">Lýsa verkefni</a>
                                <template x-if="$store.app.user.role === 'craftsman'">
                                    <a href="#" @click.prevent="$store.app.view = 'craftsman-setup'; open = false" class="block px-4 py-2.5 text-sm hover:bg-slate-50 transition">Prófíll stillingar</a>
                                </template>
                                <hr class="my-1">
                                <button @click="$store.app.logout(); open = false" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition">Útskráning</button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</nav>

<!-- Mobile bottom nav -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-white border-t border-slate-200 md:hidden">
    <div class="flex justify-around py-2">
        <button @click="$store.app.view = 'home'" class="flex flex-col items-center gap-0.5 px-4 py-1" :class="$store.app.view === 'home' ? 'text-blue-600' : 'text-slate-400'">
            <i class="fas fa-home text-lg"></i>
            <span class="text-[10px] font-medium">Heim</span>
        </button>
        <button @click="$store.app.view = 'jobs'" class="flex flex-col items-center gap-0.5 px-4 py-1" :class="$store.app.view === 'jobs' ? 'text-blue-600' : 'text-slate-400'">
            <i class="fas fa-search text-lg"></i>
            <span class="text-[10px] font-medium">Verkefni</span>
        </button>
        <button @click="$store.app.view = 'post-job'" class="flex flex-col items-center gap-0.5 px-4 py-1 -mt-3" :class="$store.app.view === 'post-job' ? 'text-blue-600' : 'text-slate-400'">
            <div class="w-11 h-11 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                <i class="fas fa-plus text-lg"></i>
            </div>
            <span class="text-[10px] font-medium">Nýtt</span>
        </button>
        <template x-if="$store.app.user">
            <button @click="$store.app.view = 'dashboard'" class="flex flex-col items-center gap-0.5 px-4 py-1" :class="$store.app.view === 'dashboard' ? 'text-blue-600' : 'text-slate-400'">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px] font-medium">Mín síða</span>
            </button>
        </template>
        <template x-if="!$store.app.user">
            <button @click="$store.app.view = 'login'" class="flex flex-col items-center gap-0.5 px-4 py-1" :class="$store.app.view === 'login' ? 'text-blue-600' : 'text-slate-400'">
                <i class="fas fa-sign-in-alt text-lg"></i>
                <span class="text-[10px] font-medium">Innskrá</span>
            </button>
        </template>
    </div>
</div>

<!-- PAGE: HOME / LANDING -->
<template x-if="$store.app.view === 'home'">
    <main x-data="landing()" class="animate-fade-in">
        <!-- Hero -->
        <section class="hero-gradient text-white pt-24 pb-20 md:pt-32 md:pb-28 relative overflow-hidden">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 25% 50%, #3b82f6 0%, transparent 50%), radial-gradient(circle at 75% 50%, #8b5cf6 0%, transparent 50%);"></div>
            <div class="orb orb-1 w-72 h-72 bg-blue-500/20 -top-10 -left-10"></div>
            <div class="orb orb-2 w-96 h-96 bg-amber-500/10 bottom-0 right-0"></div>
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                <div class="max-w-3xl mx-auto text-center">
                    <div class="badge-pulse inline-flex items-center gap-2 bg-white/10 border border-white/20 rounded-full px-5 py-1.5 mb-6 backdrop-blur-sm">
                        <i class="fas fa-shield-alt text-blue-300 text-xs"></i>
                        <span class="text-blue-200 text-sm font-medium">Tryggð greiðsla & ábyrgð</span>
                    </div>
                    <h1 class="font-display text-4xl sm:text-5xl md:text-7xl font-extrabold mb-6 tracking-tight leading-[1.1]">
                        Finndu réttu <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-500">fagmanninn</span><br class="hidden sm:block"> fyrir verkið
                    </h1>
                    <p class="text-lg sm:text-xl text-slate-300 mb-10 max-w-2xl mx-auto font-light leading-relaxed">
                        Leitarðu að rafvirkja, pípara eða smið? Verktorg.is tengir þig við staðfesta fagmenn — öruggt, einfalt og hratt.
                    </p>

                    <!-- Search -->
                    <div class="max-w-2xl mx-auto mb-8">
                        <div class="flex gap-2 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-1.5">
                            <div class="flex-1 relative">
                                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" x-model="searchQuery" @keydown.enter="search()"
                                    placeholder="Leita að rafvirkja, pípara, smið..." class="w-full bg-transparent text-white placeholder-slate-400 pl-11 pr-4 py-3.5 rounded-xl focus:outline-none text-sm">
                            </div>
                            <button @click="search()" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-6 rounded-xl transition flex items-center gap-2 text-sm">
                                <i class="fas fa-arrow-right"></i>
                                <span class="hidden sm:inline">Leita</span>
                            </button>
                        </div>
                    </div>

                    <!-- Categories -->
                    <template x-if="!loading && categories.length">
                        <div class="mt-8">
                            <p class="text-slate-400 text-sm mb-4">Vinsælir flokkar:</p>
                            <div class="category-grid">
                                <template x-for="cat in categories.slice(0, 8)" :key="cat.id">
                                    <button @click="browseCategory(cat)" class="cat-chip flex items-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl px-4 py-3 transition text-sm">
                                        <span class="cat-icon w-5 h-5 text-blue-400 shrink-0" x-html="categoryIcon(cat.id)"></span>
                                        <span x-text="cat.label"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- How it works -->
        <section class="py-20 bg-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-16">
                    <span class="badge bg-blue-100 text-blue-700 mb-4">SVONA VIRKAR ÞAÐ</span>
                    <h2 class="font-display text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4">Þrjú einföld skref</h2>
                    <p class="text-slate-600 max-w-xl mx-auto">Frá beiðni til útskilaðs verks — allt á einum stað.</p>
                </div>

                </div>

                    </template>

            </div>

                            <template x-for="bid in myBids" :key="bid.id">
                                <div class="bg-white rounded-2xl border border-slate-100 p-5">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <p class="font-bold text-lg"><span x-text="bid.amount.toLocaleString()"></span> kr.</p>
                                            <p class="text-sm text-slate-500">Staða: <span class="badge" :class="bid.status === 'pending' ? 'bg-amber-50 text-amber-700' : bid.status === 'accepted' ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'" x-text="bid.status === 'pending' ? 'Bíður' : bid.status === 'accepted' ? 'Samþykkt' : 'Hafnað'"></span></p>
                                        </div>
                                        <span class="text-xs text-slate-400" x-text="new Date(bid.created_at).toLocaleDateString('is-IS')"></span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Tab: Availability -->
            <template x-if="activeTab === 'availability'">
                <div x-data="availabilityManager()">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-bold text-lg">Framboðstímar</h2>
                        <button @click="addWeek()" class="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 font-medium px-4 py-2 rounded-xl transition"><i class="fas fa-calendar-week mr-1.5"></i>Setja inn viku</button>
                    </div>

                    <div class="bg-white rounded-2xl border border-slate-100 p-6 mb-6">
                        <h3 class="font-bold text-sm mb-4">Bæta við tíma</h3>
                        <div class="grid sm:grid-cols-4 gap-3">
                            <input type="date" x-model="newSlot.date" class="input-field text-sm sm:col-span-2">
                            <input type="time" x-model="newSlot.start_time" class="input-field text-sm">
                            <input type="time" x-model="newSlot.end_time" class="input-field text-sm">
                        </div>
                        <button @click="addSlot()" class="mt-3 bg-blue-600 text-white px-5 py-2.5 rounded-xl hover:bg-blue-700 transition text-sm font-medium"><i class="fas fa-plus mr-1.5"></i>Bæta við</button>
                    </div>

                    <template x-if="loading">
                        <div class="space-y-2"><template x-for="i in 3"><div class="skeleton h-12 rounded-xl"></div></template></div>
                    </template>

                    <template x-if="!loading && slots.length === 0">
                        <div class="text-center py-12 bg-white rounded-2xl border border-slate-100">
                            <i class="fas fa-calendar text-slate-200 text-4xl mb-3"></i>
                            <p class="text-slate-500">Engir framboðstímar skráðir.</p>
                        </div>
                    </template>

                    <template x-if="!loading && slots.length">
                        <div class="bg-white rounded-2xl border border-slate-100 p-4">
                            <template x-for="slot in slots" :key="slot.id">
                                <div class="flex justify-between items-center py-3 border-b border-slate-50 last:border-0">
                                    <div class="flex items-center gap-4">
                                        <span class="text-sm font-medium text-slate-700 w-24" x-text="formatDate(slot.date)"></span>
                                        <span class="text-sm text-slate-500"><span x-text="formatTime(slot.start_time)"></span> - <span x-text="formatTime(slot.end_time)"></span></span>
                                        <span class="badge text-[10px]" :class="slot.is_booked ? 'bg-amber-50 text-amber-700' : 'bg-emerald-50 text-emerald-700'" x-text="slot.is_booked ? 'Bókað' : 'Laus'"></span>
                                    </div>
                                    <button @click="deleteSlot(slot.id)" class="text-red-400 hover:text-red-600 transition text-sm" x-show="!slot.is_booked"><i class="fas fa-times"></i></button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Tab: Profile (craftsman setup) -->
            <template x-if="activeTab === 'profile'">
                <div x-data="craftsmanSetup()">
                    <h2 class="font-bold text-lg mb-6">Fagmannsprófíll</h2>
                    <div class="bg-white rounded-2xl border border-slate-100 p-6 sm:p-8">
                        <form @submit.prevent="submit()" class="space-y-4">
                            <div class="grid sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-sm font-semibold text-slate-700 mb-1 block">Flokkur</label>
                                    <select x-model="form.trade_category" class="input-field text-sm">
                                        <option value="rafvirkjun">Rafvirkjun</option>
                                        <option value="pipulagnir">Pípulagnir</option>
                                        <option value="byggingarvinna">Byggingarvinna</option>
                                        <option value="malun">Málun</option>
                                        <option value="gardyrkja">Garðyrkja</option>
                                        <option value="hreinsun">Hreinsun</option>
                                        <option value="husgagnasmidi">Húsgagnasmíði</option>
                                        <option value="annad">Annað</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-sm font-semibold text-slate-700 mb-1 block">Leyfisnúmer</label>
                                    <input type="text" x-model="form.license_number" class="input-field text-sm" placeholder="Vinnueftirlitið">
                                </div>
                            </div>

                            <div>
                                <label class="text-sm font-semibold text-slate-700 mb-1 block">Lýsing</label>
                                <textarea x-model="form.description" rows="4" class="input-field text-sm" placeholder="Segðu viðskiptavinum frá þér, þinni reynslu og því sem þú gerir."></textarea>
                            </div>

                            <div class="grid sm:grid-cols-3 gap-4">
                                <div>
                                    <label class="text-sm font-semibold text-slate-700 mb-1 block">Staðsetning</label>
                                    <input type="text" x-model="form.location" class="input-field text-sm" placeholder="Reykjavík">
                                </div>
                                <div>
                                    <label class="text-sm font-semibold text-slate-700 mb-1 block">Ár í starfi</label>
                                    <input type="number" x-model="form.years_experience" class="input-field text-sm" min="0">
                                </div>
                                <div>
                                    <label class="text-sm font-semibold text-slate-700 mb-1 block">Klst. taxti (ISK)</label>
                                    <input type="number" x-model="form.hourly_rate" class="input-field text-sm" min="0" placeholder="10.000">
                                </div>
                            </div>

                            <button type="submit" :disabled="submitting" class="btn-primary">
                                <i :class="submitting ? 'fas fa-spinner fa-spin' : 'fas fa-save'" class="mr-2"></i>
                                Vista prófíl
                            </button>
                        </form>
                    </div>
                </div>
            </template>
        </div>
    </main>
</template>

<!-- PAGE: CRAFTSMAN SETUP (standalone) -->
<template x-if="$store.app.view === 'craftsman-setup'">
    <main class="pt-20 pb-24 animate-fade-in" x-data="craftsmanSetup()">
        <div class="max-w-2xl mx-auto px-4">
            <div class="bg-white rounded-2xl border border-slate-100 p-6 sm:p-8 shadow-sm">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center"><i class="fas fa-briefcase text-xl"></i></div>
                    <div>
                        <h1 class="font-display text-2xl font-extrabold text-slate-900">Fagmannsprófíll</h1>
                        <p class="text-slate-500 text-sm">Stilla hvernig þú birtist viðskiptavinum.</p>
                    </div>
                </div>

                <form @submit.prevent="submit()" class="space-y-4">
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm font-semibold text-slate-700 mb-1 block">Flokkur</label>
                            <select x-model="form.trade_category" class="input-field text-sm">
                                <option value="rafvirkjun">Rafvirkjun</option>
                                <option value="pipulagnir">Pípulagnir</option>
                                <option value="byggingarvinna">Byggingarvinna</option>
                                <option value="malun">Málun</option>
                                <option value="gardyrkja">Garðyrkja</option>
                                <option value="hreinsun">Hreinsun</option>
                                <option value="husgagnasmidi">Húsgagnasmíði</option>
                                <option value="annad">Annað</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-slate-700 mb-1 block">Leyfisnúmer</label>
                            <input type="text" x-model="form.license_number" class="input-field text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="text-sm font-semibold text-slate-700 mb-1 block">Lýsing</label>
                        <textarea x-model="form.description" rows="5" class="input-field text-sm" placeholder="Segðu viðskiptavinum frá þér."></textarea>
                    </div>
                    <div class="grid sm:grid-cols-3 gap-4">
                        <div>
                            <label class="text-sm font-semibold text-slate-700 mb-1 block">Staðsetning</label>
                            <input type="text" x-model="form.location" class="input-field text-sm" placeholder="Reykjavík">
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-slate-700 mb-1 block">Ár í starfi</label>
                            <input type="number" x-model="form.years_experience" class="input-field text-sm" min="0">
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-slate-700 mb-1 block">Klst. taxti</label>
                            <input type="number" x-model="form.hourly_rate" class="input-field text-sm" min="0" placeholder="10.000">
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button type="submit" :disabled="submitting" class="btn-primary">
                            <i :class="submitting ? 'fas fa-spinner fa-spin' : 'fas fa-save'" class="mr-2"></i>Vista
                        </button>
                        <button @click.prevent="$store.app.view = 'dashboard'" type="button" class="px-6 py-3 border border-slate-200 rounded-xl font-medium text-sm hover:bg-slate-50 transition">Til baka</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</template>

</body>
</html>
