<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Verktorg.is — Íslenskt markaðstorg fyrir fagmenn og verkefni.">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data:; img-src 'self' data:; connect-src 'self';">
    <link rel="icon" type="image/svg+xml" href="/frontend/favicon.svg">
    <title>Verktorg.is — Markaðstorg fagmanna</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 antialiased" x-data="verktorg()" x-init="init()" x-cloak>

<!-- ==================================================================
     NOTIFICATION TOAST
     ================================================================== -->
<div class="toast" x-show="notification" x-transition>
    <div :class="'toast-item toast-'+notification.type" x-text="notification.msg"></div>
</div>

<!-- ==================================================================
     NAVBAR
     ================================================================== -->
<nav class="nav" x-show="view !== 'home'">
    <div class="nav-inner">
        <a href="#" @click.prevent="navigate('home')" class="nav-logo">
            <svg viewBox="0 0 44 44"><rect x="2" y="2" width="40" height="40" rx="12" fill="#0f172a" stroke="#2563eb" stroke-width="1.5"/><path d="M13 24l6 6 12-16" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            Verktorg.is
        </a>
        <div class="nav-links">
            <button class="nav-link" :class="{active:view==='marketplace'}" @click="navigate('marketplace')">
                <i class="fas fa-search"></i> Leita
            </button>
            <button class="nav-link" :class="{active:view==='craftsmen'}" @click="navigate('craftsmen')">
                <i class="fas fa-hard-hat"></i> Fagmenn
            </button>
            <template x-if="user">
                <button class="nav-link" :class="{active:view==='dashboard'}" @click="navigate('dashboard')">
                    <i class="fas fa-user"></i> Mín síða
                </button>
            </template>
            <template x-if="!user">
                <button class="nav-btn nav-btn-blue" @click="showAuth = true">Skrá inn</button>
            </template>
            <template x-if="user">
                <button class="nav-btn nav-btn-outline" @click="logout()">Útskrá</button>
            </template>
        </div>
    </div>
</nav>

<!-- ==================================================================
     HOME — Landing Page
     ================================================================== -->
<template x-if="view === 'home'">
<div>
    <div class="hero" style="min-height:calc(100vh - 0px)">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <div class="hero-badge"><i class="fas fa-bolt"></i> Nýtt markaðstorg á Íslandi</div>
            <h1>Finndu <span>réttu fagmanninn</span> fyrir verkið</h1>
            <p>Verktorg tengir þig við íslenska iðnaðarmenn, verktaka og sérfræðinga. Leggðu inn verkefni og fáðu tilboð — eða skráðu þig sem fagmaður og finndu næsta verkefni.</p>
            <div class="hero-buttons">
                <button class="hero-btn hero-btn-primary" @click="navigate('marketplace')">
                    <i class="fas fa-search"></i> Skoða verkefni
                </button>
                <button class="hero-btn hero-btn-secondary" @click="showAuth = true">
                    <i class="fas fa-user-plus"></i> Skrá mig sem fagmann
                </button>
            </div>
            <div class="hero-stats">
                <div class="hero-stat"><div class="hero-stat-value" x-text="stats.jobs">0</div><div class="hero-stat-label">Verkefni</div></div>
                <div class="hero-stat"><div class="hero-stat-value" x-text="stats.craftsmen">0</div><div class="hero-stat-label">Fagmenn</div></div>
                <div class="hero-stat"><div class="hero-stat-value" x-text="stats.categories">13</div><div class="hero-stat-label">Sérsvið</div></div>
            </div>
        </div>
    </div>
    <!-- How it works -->
    <div class="section" style="background:white">
        <div class="section-header"><h2>Hvernig virkar þetta?</h2><p>Einfalt ferli í þremur skrefum</p></div>
        <div class="steps">
            <div class="step-card"><div class="step-number">1</div><h3>Skráðu þig</h3><p>Búðu til aðgang, veldu hvort þú ert viðskiptavinur eða fagmaður.</p></div>
            <div class="step-card"><div class="step-number">2</div><h3>Leggðu fram verk</h3><p>Lýstu verkefninu, veldu flokk og staðsetningu. Eða skráðu lausa tíma sem fagmaður.</p></div>
            <div class="step-card"><div class="step-number">3</div><h3>Fáðu tilboð</h3><p>Fagmenn senda tilboð í verkið. Þú velur þann sem hentar best.</p></div>
        </div>
        <div class="text-center mt-8">
            <button class="hero-btn hero-btn-primary" @click="navigate('marketplace')">
                <i class="fas fa-arrow-right"></i> Fara á markaðstorg
            </button>
        </div>
    </div>
</div>
</template>

<!-- ==================================================================
     MARKETPLACE
     ================================================================== -->
<template x-if="view === 'marketplace'">
<div class="section" style="padding-top:96px">
    <div class="market-header">
        <h2 class="market-title"><i class="fas fa-briefcase" style="color:var(--vt-blue);margin-right:10px"></i> Verkefni</h2>
        <div class="market-filters">
            <input type="text" class="filter-search" placeholder="Leita að verkefnum..." x-model="filterSearch" @input.debounce.300ms="loadJobs()">
            <select class="filter-select" x-model="filterCategory" @change="loadJobs()">
                <option value="">Allir flokkar</option>
                <template x-for="cat in categories" :key="cat.value">
                    <option :value="cat.value" x-text="cat.label"></option>
                </template>
            </select>
            <select class="filter-select" x-model="filterSort" @change="loadJobs()">
                <option value="newest">Nýjustu fyrst</option>
                <option value="oldest">Elstu fyrst</option>
                <option value="budget_high">Hæsta upphæð</option>
                <option value="budget_low">Lægsta upphæð</option>
            </select>
            <button class="btn btn-primary" @click="showPostJob = true" x-show="user">
                <i class="fas fa-plus"></i> Leggja fram verk
            </button>
        </div>
    </div>

    <!-- Loading -->
    <div x-show="loading.jobs" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px">
        <template x-for="i in 3"><div style="height:200px" class="skeleton"></div></template>
    </div>

    <!-- Job Grid -->
    <div class="job-grid" x-show="!loading.jobs && jobs.length > 0">
        <template x-for="job in jobs" :key="job.id">
            <div class="job-card">
                <div class="job-card-header">
                    <div>
                        <span class="job-category" x-text="categoryLabel(job.category)"></span>
                        <span x-show="countdown(job).urgent" class="countdown urgent" style="margin-left:8px">
                            <i class="fas fa-clock"></i> <span x-text="countdown(job).text"></span>
                        </span>
                    </div>
                    <span x-show="countdown(job).days < 3 && !countdown(job).urgent" class="countdown soon">
                        <i class="fas fa-clock"></i> <span x-text="countdown(job).text"></span>
                    </span>
                </div>
                <div class="job-title" x-text="job.title"></div>
                <div class="job-desc" x-text="job.description"></div>
                <div class="job-meta">
                    <span><i class="fas fa-map-marker-alt"></i> <span x-text="job.location || 'Ísland'"></span></span>
                    <span><i class="fas fa-calendar"></i> <span x-text="formatDate(job.created_at)"></span></span>
                    <span><i class="fas fa-file-signature"></i> <span x-text="(job.bid_count||0)+' tilboð'"></span></span>
                </div>
                <div class="job-footer">
                    <div class="job-budget" x-show="job.is_fixed_price" x-text="formatISK(job.budget_min)"></div>
                    <div class="job-budget" x-show="!job.is_fixed_price">
                        <span x-text="formatISK(job.budget_min)"></span> — <span x-text="formatISK(job.budget_max)"></span>
                    </div>
                    <button class="btn btn-primary btn-sm" @click="viewJob(job)">Skoða</button>
                </div>
            </div>
        </template>
    </div>

    <!-- Empty -->
    <div class="empty-state" x-show="!loading.jobs && jobs.length === 0">
        <i class="fas fa-search"></i><p>Engin verkefni fundust</p>
    </div>

    <!-- Pagination -->
    <div class="pagination" x-show="totalPages > 1">
        <button :disabled="page <= 1" @click="page--; loadJobs()"><i class="fas fa-chevron-left"></i></button>
        <span class="pagination-info" x-text="'Síða '+page+' af '+totalPages"></span>
        <button :disabled="page >= totalPages" @click="page++; loadJobs()"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>
</template>

<!-- ==================================================================
     CRAFTSMEN DIRECTORY
     ================================================================== -->
<template x-if="view === 'craftsmen'">
<div class="section" style="padding-top:96px">
    <div class="market-header">
        <h2 class="market-title"><i class="fas fa-hard-hat" style="color:var(--vt-amber);margin-right:10px"></i> Fagmenn</h2>
        <div class="market-filters">
            <input type="text" class="filter-search" placeholder="Leita eftir nafni eða stað..." x-model="craftFilter" @input.debounce.300ms="loadCraftsmen()">
            <select class="filter-select" x-model="craftCategory" @change="loadCraftsmen()">
                <option value="">Allir flokkar</option>
                <template x-for="cat in categories" :key="cat.value">
                    <option :value="cat.value" x-text="cat.label"></option>
                </template>
            </select>
        </div>
    </div>
    <div class="craft-grid" x-show="!loading.craftsmen">
        <template x-for="c in craftsmen" :key="c.user_id">
            <div class="craft-card">
                <div class="craft-avatar" x-text="c.full_name?.[0] || '?'"></div>
                <div class="craft-name" x-text="c.full_name"></div>
                <div class="craft-trade" x-text="categoryLabel(c.trade_category)"></div>
                <div class="craft-location"><i class="fas fa-map-marker-alt"></i> <span x-text="c.location || 'Ísland'"></span></div>
                <div class="craft-rate" x-text="formatISK(c.hourly_rate)+'/klst'" x-show="c.hourly_rate"></div>
                <div class="craft-stars" x-show="c.avg_rating">
                    <template x-for="i in 5"><i :class="i <= Math.round(c.avg_rating) ? 'fas fa-star' : 'far fa-star'"></i></template>
                    <span style="color:var(--vt-text-muted);font-size:12px;margin-left:4px" x-text="'('+(c.review_count||0)+')'"></span>
                </div>
                <div :class="'craft-badge '+(c.is_available ? 'available' : 'busy')" x-text="c.is_available ? 'Laus' : 'Upptekinn'"></div>
                <button class="btn btn-primary btn-sm btn-full" style="margin-top:14px" @click="viewCraftsman(c)">Skoða</button>
            </div>
        </template>
    </div>
</div>
</template>

<!-- ==================================================================
     AUTH MODAL
     ================================================================== -->
<template x-if="showAuth">
<div class="modal-overlay" @click.self="showAuth = false">
    <div class="modal">
        <div class="flex-between" style="margin-bottom:24px">
            <h3 x-text="authMode==='login'?'Skrá inn':'Nýskráning'"></h3>
            <button style="font-size:20px;background:none;color:var(--vt-text-muted)" @click="showAuth = false">&times;</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:24px;background:var(--vt-surface-muted);border-radius:8px;padding:4px">
            <button @click="authMode='login'" :style="{background:authMode==='login'?'white':'transparent',flex:1,padding:'10px',borderRadius:'6px',fontWeight:'600',fontSize:'14px'}">Innskráning</button>
            <button @click="authMode='register'" :style="{background:authMode==='register'?'white':'transparent',flex:1,padding:'10px',borderRadius:'6px',fontWeight:'600',fontSize:'14px'}">Nýskráning</button>
        </div>
        <form @submit.prevent="authMode==='login'?login():register()">
            <div class="form-group"><label class="form-label">Netfang</label><input type="email" class="form-input" x-model="authForm.email" required></div>
            <div class="form-group"><label class="form-label">Lykilorð</label><input type="password" class="form-input" x-model="authForm.password" required minlength="6"></div>
            <template x-if="authMode==='register'">
                <div>
                    <div class="form-group"><label class="form-label">Fullt nafn</label><input type="text" class="form-input" x-model="authForm.full_name" required></div>
                    <div class="form-group"><label class="form-label">Símanúmer</label><input type="text" class="form-input" x-model="authForm.phone"></div>
                    <div class="form-group"><label class="form-label">Hlutverk</label>
                        <select class="form-select" x-model="authForm.role">
                            <option value="customer">Viðskiptavinur</option>
                            <option value="craftsman">Fagmaður</option>
                        </select>
                    </div>
                </div>
            </template>
            <button type="submit" class="btn btn-primary btn-full" :disabled="authLoading" x-text="authLoading?'Vinnur...':(authMode==='login'?'Skrá inn':'Stofna aðgang')"></button>
        </form>
    </div>
</div>
</template>

<!-- ==================================================================
     POST JOB MODAL
     ================================================================== -->
<template x-if="showPostJob">
<div class="modal-overlay" @click.self="showPostJob = false">
    <div class="modal" style="max-width:560px">
        <div class="flex-between" style="margin-bottom:24px">
            <h3>Leggja fram verkefni</h3>
            <button style="font-size:20px;background:none;color:var(--vt-text-muted)" @click="showPostJob = false">&times;</button>
        </div>
        <form @submit.prevent="postJob()">
            <div class="form-group"><label class="form-label">Titill</label><input type="text" class="form-input" x-model="jobForm.title" required placeholder="t.d. Uppsetning á ofni"></div>
            <div class="form-group"><label class="form-label">Lýsing</label><textarea class="form-input" x-model="jobForm.description" rows="3" placeholder="Lýstu verkefninu í stuttu máli..."></textarea></div>
            <div class="form-group"><label class="form-label">Flokkur</label>
                <select class="form-select" x-model="jobForm.category">
                    <option value="">Veldu flokk</option>
                    <template x-for="cat in categories" :key="cat.value">
                        <option :value="cat.value" x-text="cat.label"></option>
                    </template>
                </select>
            </div>
            <div class="form-group"><label class="form-label">Staðsetning</label><input type="text" class="form-input" x-model="jobForm.location" placeholder="t.d. Reykjavík"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group"><label class="form-label">Lágmarksupphæð (ISK)</label><input type="number" class="form-input" x-model="jobForm.budget_min" placeholder="0"></div>
                <div class="form-group"><label class="form-label">Hámarksupphæð (ISK)</label><input type="number" class="form-input" x-model="jobForm.budget_max" placeholder="0"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" :disabled="jobPosting" x-text="jobPosting?'Sendi inn...':'Birta verkefni'"></button>
        </form>
    </div>
</div>
</template>

<!-- ==================================================================
     JOB DETAIL MODAL
     ================================================================== -->
<template x-if="jobDetail">
<div class="modal-overlay" @click.self="jobDetail = null">
    <div class="modal" style="max-width:640px">
        <button style="font-size:20px;background:none;color:var(--vt-text-muted);float:right" @click="jobDetail = null">&times;</button>
        <span class="job-category" x-text="categoryLabel(jobDetail.category)"></span>
        <h3 x-text="jobDetail.title" style="margin:12px 0 8px"></h3>
        <p x-text="jobDetail.description" style="color:var(--vt-text-muted);font-size:14px;line-height:1.6;margin-bottom:16px"></p>
        <div class="job-meta" style="margin-bottom:16px">
            <span><i class="fas fa-map-marker-alt"></i> <span x-text="jobDetail.location||'Ísland'"></span></span>
            <span><i class="fas fa-calendar"></i> <span x-text="formatDate(jobDetail.created_at)"></span></span>
        </div>
        <div class="job-budget" style="margin-bottom:20px;font-size:22px" x-text="formatISK(jobDetail.budget_min)"></div>

        <!-- Bids -->
        <template x-if="jobDetail.bids && jobDetail.bids.length > 0">
            <div style="border-top:1px solid var(--vt-border);padding-top:16px;margin-bottom:16px">
                <h4 style="font-size:15px;font-weight:600;margin-bottom:12px">Tilboð (x-text="jobDetail.bids.length")</h4>
                <template x-for="bid in jobDetail.bids" :key="bid.id">
                    <div style="background:var(--vt-surface-muted);border-radius:8px;padding:14px;margin-bottom:8px">
                        <div class="flex-between">
                            <strong x-text="bid.craftsman_name"></strong>
                            <strong style="color:var(--vt-blue)" x-text="formatISK(bid.amount)"></strong>
                        </div>
                        <p x-text="bid.message" style="font-size:13px;color:var(--vt-text-muted);margin-top:4px" x-show="bid.message"></p>
                    </div>
                </template>
            </div>
        </template>
    </div>
</div>
</template>


<script>
function verktorg() {
    return {
        // State
        view: 'home',
        user: null,
        showAuth: false,
        authMode: 'login',
        authLoading: false,
        authForm: { email: '', password: '', full_name: '', phone: '', role: 'customer' },
        notification: null,
        // Marketplace
        jobs: [], craftsmen: [], categories: [],
        filterSearch: '', filterCategory: '', filterSort: 'newest',
        craftFilter: '', craftCategory: '',
        page: 1, perPage: 12, totalPages: 1,
        loading: { jobs: false, craftsmen: false },
        jobDetail: null,
        showPostJob: false, jobPosting: false,
        jobForm: { title: '', description: '', category: '', location: '', budget_min: '', budget_max: '' },
        // Stats
        stats: { jobs: 0, craftsmen: 0, categories: 13 },

        async init() {
            await this.loadCategories();
            await this.loadStats();
            // Check existing token
            const tok = localStorage.getItem('verktorg_token');
            if (tok) {
                try {
                    this.user = await this.api('/api/auth/me');
                } catch { localStorage.removeItem('verktorg_token'); }
            }
        },

        async api(path, opts = {}) {
            const token = localStorage.getItem('verktorg_token');
            const headers = { 'Content-Type': 'application/json', ...opts.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(path, { ...opts, headers });
            if (res.status === 401) { localStorage.removeItem('verktorg_token'); this.user = null; throw new Error('Unauthorized'); }
            if (!res.ok) { const e = await res.json().catch(() => ({ detail: 'Villa' })); throw new Error(e.detail || 'Villa'); }
            return res.json();
        },

        notify(msg, type = 'info') {
            this.notification = { msg, type };
            setTimeout(() => this.notification = null, 4000);
        },

        navigate(v) { this.view = v; if (v === 'marketplace') this.loadJobs(); if (v === 'craftsmen') this.loadCraftsmen(); window.scrollTo(0, 0); },

        // Auth
        async login() {
            this.authLoading = true;
            try {
                const data = await this.api('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email: this.authForm.email, password: this.authForm.password })
                });
                localStorage.setItem('verktorg_token', data.access_token);
                this.user = await this.api('/api/auth/me');
                this.showAuth = false;
                this.notify('Innskráning tókst!', 'success');
            } catch (e) { this.notify(e.message, 'error'); }
            this.authLoading = false;
        },

        async register() {
            this.authLoading = true;
            try {
                await this.api('/api/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(this.authForm)
                });
                this.notify('Nýskráning tókst! Skráðu þig inn.', 'success');
                this.authMode = 'login';
            } catch (e) { this.notify(e.message, 'error'); }
            this.authLoading = false;
        },

        logout() {
            localStorage.removeItem('verktorg_token');
            this.user = null;
            this.navigate('home');
            this.notify('Útskráð/ur', 'info');
        },

        // Stats
        async loadStats() {
            try {
                const [jobs, craftsmen] = await Promise.all([
                    this.api('/api/jobs?page=1&per_page=1').catch(() => ({ total: 0 })),
                    this.api('/api/craftsmen?page=1&per_page=1').catch(() => ({ total: 0 }))
                ]);
                this.stats.jobs = jobs.total || 0;
                this.stats.craftsmen = craftsmen.total || 0;
            } catch {}
        },

        // Categories
        async loadCategories() {
            try { this.categories = await this.api('/api/categories'); }
            catch { this.categories = []; }
        },

        categoryLabel(val) {
            const c = this.categories.find(c => c.value === val);
            return c ? c.label : val;
        },

        // Marketplace
        async loadJobs() {
            this.loading.jobs = true;
            try {
                const params = new URLSearchParams({ page: this.page, per_page: this.perPage, sort: this.filterSort });
                if (this.filterSearch) params.set('search', this.filterSearch);
                if (this.filterCategory) params.set('category', this.filterCategory);
                const data = await this.api(`/api/jobs?${params}`);
                this.jobs = data.items || [];
                this.totalPages = Math.ceil((data.total || 0) / this.perPage);
            } catch (e) { this.jobs = []; }
            this.loading.jobs = false;
        },

        viewJob(job) { this.jobDetail = job; },

        async postJob() {
            this.jobPosting = true;
            try {
                const body = { ...this.jobForm };
                if (body.budget_min) body.budget_min = parseInt(body.budget_min);
                if (body.budget_max) body.budget_max = parseInt(body.budget_max);
                await this.api('/api/jobs', { method: 'POST', body: JSON.stringify(body) });
                this.showPostJob = false;
                this.notify('Verkefni birt!', 'success');
                this.jobForm = { title: '', description: '', category: '', location: '', budget_min: '', budget_max: '' };
                await this.loadJobs();
            } catch (e) { this.notify(e.message, 'error'); }
            this.jobPosting = false;
        },

        // Countdown logic
        countdown(job) {
            if (!job.created_at) return { text: '', days: 999, urgent: false };
            const created = new Date(job.created_at);
            const deadline = new Date(created.getTime() + 14 * 24 * 60 * 60 * 1000); // 14 days
            const now = new Date();
            const diff = deadline - now;
            const days = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
            const hours = Math.floor((diff % (86400000)) / 3600000);
            const urgent = days < 2;
            if (diff <= 0) return { text: 'Útrunnið', days, urgent: true };
            if (days < 1) return { text: `${hours} klst eftir`, days, urgent: true };
            return { text: `${days} dagar eftir`, days, urgent };
        },

        // Craftsmen
        async loadCraftsmen() {
            this.loading.craftsmen = true;
            try {
                const params = new URLSearchParams({ page: 1, per_page: 50 });
                if (this.craftFilter) params.set('search', this.craftFilter);
                if (this.craftCategory) params.set('category', this.craftCategory);
                const data = await this.api(`/api/craftsmen?${params}`);
                this.craftsmen = data.items || [];
            } catch (e) { this.craftsmen = []; }
            this.loading.craftsmen = false;
        },

        viewCraftsman(c) { this.notify(`${c.full_name} — ${this.categoryLabel(c.trade_category)}`, 'info'); },

        // Helpers
        formatDate(d) { if (!d) return ''; return new Date(d).toLocaleDateString('is-IS', { day: 'numeric', month: 'short' }); },
        formatISK(n) { if (!n && n !== 0) return ''; return new Intl.NumberFormat('is-IS', { style: 'currency', currency: 'ISK', maximumFractionDigits: 0 }).format(n); },
    };
}
</script>
</body>
</html>
